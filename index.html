<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mid-July Official Website</title>
    <style>
        body {
            background-color: black;
            color: red;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            animation: fadeIn 1s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        header {
            background: #222;
            padding: 10px 20px;
            text-align: center;
        }

        nav a {
            color: red;
            text-decoration: none;
            margin: 0 15px;
        }

        nav a:hover {
            text-shadow: 0 0 10px red;
            transition: text-shadow 0.3s;
        }

        .container {
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Mid-July Official Website</h1>
        <nav>
            <a href="/forum">Forum</a>
            <a href="/about">About</a>
            <a href="/games">Game IP Showcase</a>
        </nav>
    </header>
    <div class="container">
        <h2>The Haunting Begins</h2>
        <p>Immerse yourself in the world of horror. Join our community and explore our terrifying creations.</p>
        <div class="animation-area">
            <!-- Animated elements can be added here -->
        </div>
    </div>
</body>
</html>
